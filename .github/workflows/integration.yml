name: Integration Tests

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build FreeSWITCH image (with cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          tags: mod_audio_stream_freeswitch:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start services
        run: docker compose -f test/integration/compose.yaml up -d

      - name: Wait for FreeSWITCH
        run: |
          for i in $(seq 60); do
            if docker exec fs_test fs_cli -x "version" 2>/dev/null; then
              echo "FreeSWITCH is ready"
              break
            fi
            echo "Waiting... ($i)"
            sleep 5
          done

      - name: Run integration tests
        run: docker exec fs_test bash /usr/src/mod_audio_stream/test/integration/run.sh

      - name: Collect logs (on failure)
        if: failure()
        run: |
          docker logs fs_test || true
          docker logs ws_test_server || true

      - name: Teardown
        if: always()
        run: docker compose -f test/integration/compose.yaml down --volumes
